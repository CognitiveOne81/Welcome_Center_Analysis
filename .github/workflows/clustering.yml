name: Qualitative Clustering

on:
  pull_request:
  workflow_dispatch:

jobs:
  clustering:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Run qualitative clustering model
        run: |
          python src/qualitative_clustering.py \
            --input "7-1-2024-5-19-2026 General Feedback.csv" \
            --output-dir outputs \
            --min-clusters 2 \
            --max-clusters 8

      - name: Upload clustering results
        uses: actions/upload-artifact@v4
        with:
          name: qualitative-clustering-results
          path: outputs/
